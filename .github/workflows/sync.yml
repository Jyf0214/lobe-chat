name: Sync LobeHub

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_job:
    runs-on: ubuntu-latest
    steps:
      - name: System Cleanup
        run: |
          echo ">>> 正在清空 /tmp 目录..."
          rm -rf /tmp/* 2>/dev/null || true
          echo ">>> /tmp 清理完毕"

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Sync Logic
        env:
          UPSTREAM_URL: https://github.com/lobehub/lobehub.git
          TARGET_REPO: Jyf0214/lobe-chat
          TARGET_BRANCH: main
          WORKFLOW_FILE: sync.yml
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          echo ">>> 配置 Git 用户信息..."
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo ">>> 备份同步工作流文件..."
          cp ".github/workflows/$WORKFLOW_FILE" "/tmp/$WORKFLOW_FILE"

          echo ">>> 拉取上游仓库 main 分支历史..."
          git remote add upstream "$UPSTREAM_URL"
          git fetch upstream "$TARGET_BRANCH"

          echo ">>> 强制切换并重置到上游 main 分支..."
          git checkout -B "$TARGET_BRANCH" "upstream/$TARGET_BRANCH"

          echo ">>> 移除 .github 文件夹内容..."
          rm -rf .github

          echo ">>> 还原同步工作流文件..."
          mkdir -p .github/workflows
          cp "/tmp/$WORKFLOW_FILE" ".github/workflows/$WORKFLOW_FILE"

          echo ">>> 提交清理与同步更改..."
          git add -A
          git commit -m "build: 同步上游历史并清理配置"

          echo ">>> 设置远程仓库地址..."
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git"

          echo ">>> 正在强制推送到远程 main 分支..."
          git push -f origin "$TARGET_BRANCH"

          echo ">>> 同步流程结束，已确保远程仅更新 main 分支"
